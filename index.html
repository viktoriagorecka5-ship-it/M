<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miło mi cię widzieć od czego zaczniemy?</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #bfe6ff;
    text-align: center;
    color: #1b2b3a;
}

h1 {
    margin-top: 120px;
}

button {
    padding: 12px 18px;
    border: none;
    border-radius: 15px;
    margin: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>to jest dla ciebie</h1>

<button onclick="showSection('oMnie')">o mnie</button>
<button onclick="showSection('oTobie')">o tobie</button>
    <div id="oMnie" style="display:none;">
    <h2>O mnie</h2>
    <p> Jestem wrazliwa i uczuciowa lubie w prost mowic istotne dla mnie rzeczy czuje sie z tym lepiej. Ostatnio lubie spedzac czas nad woda bo mnie uspokaja lubie takze mowic duzo rzeczy takiemu jednemu brunetowi.</p>
</div>

<div id="oTobie" style="display:none;">
    <h2>O tobie</h2>
    <p>Tutaj będzie napisane, dlaczego jesteś ważny.</p>
</div>

<script>
function showSection(sectionId) {

    document.getElementById("oMnie").style.display = "none";
    document.getElementById("oTobie").style.display = "none";

    document.getElementById(sectionId).style.display = "block";
}
</script>
</body>
</html>
